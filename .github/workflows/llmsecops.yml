name: LLMSecOps

# One pipeline, one stage per scanner. Each stage runs the SAME security/*/run.sh
# used locally, so CI and local never drift.
#
#   promptfoo  model   CyberSecEval injection benchmark vs the vLLM router
#   garak      app     probes the live image's /recommend (RAG + prompt + LLM)
#   llmmap     model   fingerprints the router (catches model substitution)
#   ps-fuzz    prompt  scores the system prompt's resilience (Groq)
on:
  workflow_dispatch:
    inputs:
      promptfoo_sample:
        description: "promptfoo: CyberSecEval cases (blank = all 251)"
        default: "25"
      garak_probes:
        description: "garak: probe families (comma-separated)"
        default: "promptinject"

permissions:
  contents: read
  id-token: write        # WIF auth to GKE

env:
  CLUSTER_NAME: anime-rec-cluster
  CLUSTER_LOCATION: us-central1-a
  NS: default
  ROUTER_SVC: vllm-router-service
  APP_DEPLOY: anime-rec-app
  SCAN_POD: llmsec-scan-target
  APP_PORT: "8600"

jobs:
  scan:
    runs-on: ubuntu-latest
    environment: production          # GROQ_API_KEY + WIF secrets
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install kubectl
        run: |
          curl -fsSLo /tmp/kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install /tmp/kubectl /usr/local/bin/kubectl

      # run.sh scripts source ./.env for GROQ_API_KEY, exactly as they do locally
      - name: Write .env
        run: echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env

      - name: Deploy ephemeral scan target
        run: |
          IMG=$(kubectl get deploy "$APP_DEPLOY" -n "$NS" \
                -o jsonpath='{.spec.template.spec.containers[0].image}')
          echo "scanning the live app image: $IMG"

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: ${SCAN_POD}
            namespace: ${NS}
            labels: { app: ${SCAN_POD} }
          spec:
            restartPolicy: Never
            securityContext: { runAsNonRoot: true, runAsUser: 10001, seccompProfile: { type: RuntimeDefault } }
            containers:
              - name: app
                image: ${IMG}
                command: ["uvicorn", "app.api:app", "--host", "0.0.0.0", "--port", "${APP_PORT}"]
                env:
                  - { name: LLM_PROVIDER, value: "vllm" }
                  - { name: VLLM_BASE_URL, value: "http://${ROUTER_SVC}.${NS}.svc.cluster.local:80/v1" }
                  - { name: VLLM_MODEL_NAME, value: "Qwen/Qwen2.5-3B-Instruct" }
                  - { name: HF_HOME, value: "/opt/hf" }
                ports: [ { containerPort: ${APP_PORT} } ]
                # ephemeral scanner pod: allow writes (Chroma/SQLite need the baked chroma_db writable)
                securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: ["ALL"] } }
          EOF

          kubectl wait --for=condition=Ready "pod/${SCAN_POD}" -n "$NS" --timeout=240s \
            || { kubectl describe pod/${SCAN_POD} -n "$NS"; kubectl logs pod/${SCAN_POD} -n "$NS"; exit 1; }

      - name: Port-forward endpoints
        run: |
          kubectl port-forward "pod/${SCAN_POD}" ${APP_PORT}:${APP_PORT} -n "$NS" > /tmp/pf-app.log 2>&1 &
          kubectl port-forward "svc/${ROUTER_SVC}" 8000:80 -n "$NS" > /tmp/pf-router.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf -X POST "http://localhost:${APP_PORT}/recommend" \
              -H 'Content-Type: application/json' -d '{"prompt":"ping"}' >/dev/null && break || sleep 3
          done
          curl -sf http://localhost:8000/v1/models >/dev/null || echo "router not ready (promptfoo/llmmap may fail)"

      # ---- scan 1/4: promptfoo — CyberSecEval vs the model behind the app ----
      - name: Promptfoo — CyberSecEval (model layer)
        continue-on-error: true
        working-directory: security/promptfoo/cyberseceval
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}      # judge
          PROMPTFOO_DISABLE_TELEMETRY: "1"
        run: |
          mkdir -p reports
          SAMPLE=""
          if [ -n "${{ inputs.promptfoo_sample }}" ]; then SAMPLE="--filter-sample ${{ inputs.promptfoo_sample }}"; fi
          npx --yes promptfoo@latest eval \
            --filter-providers cloud-vllm \
            $SAMPLE \
            -o reports/promptfoo.html \
            -o reports/promptfoo.json

      # ---- scan 2/4: garak — vs the deployed app (/recommend) ----
      - name: Garak — probes (app layer)
        continue-on-error: true
        env:
          PROBES: ${{ inputs.garak_probes }}
          APP_URL: http://localhost:8600/recommend
        run: |
          python3 -m venv /tmp/garakvenv
          /tmp/garakvenv/bin/pip install -q -U pip garak
          source /tmp/garakvenv/bin/activate
          security/garak/run.sh app

      # ---- scan 3/4: llmmap — fingerprint the router (model substitution) ----
      - name: LLMmap — fingerprint (model layer)
        continue-on-error: true
        env:
          CLOUD_BASE_URL: http://localhost:8000/v1
        run: |
          git clone --depth 1 https://github.com/pasquini-dario/LLMmap.git security/llmmap/LLMmap
          python3 -m venv /tmp/llmmapvenv
          /tmp/llmmapvenv/bin/pip install -q -U pip
          /tmp/llmmapvenv/bin/pip install -q -r security/llmmap/LLMmap/requirements.txt
          source /tmp/llmmapvenv/bin/activate
          mkdir -p security/llmmap/reports
          security/llmmap/run.sh cloud 2>&1 | tee security/llmmap/reports/llmmap-cloud.txt

      # ---- scan 4/4: ps-fuzz — system-prompt resilience (Groq) ----
      - name: ps-fuzz — system prompt (prompt layer)
        continue-on-error: true
        run: |
          python3 -m venv /tmp/psfuzzvenv
          /tmp/psfuzzvenv/bin/pip install -q -U pip prompt-security-fuzzer
          source /tmp/psfuzzvenv/bin/activate
          security/ps-fuzz/run.sh

      # ---- report ----
      - name: Job summary
        if: always()
        run: |
          python3 - <<'PY'
          import json, glob, os
          out = []
          for f in glob.glob("security/promptfoo/cyberseceval/reports/promptfoo.json"):
              try: d = json.load(open(f))
              except Exception: continue
              st = (d.get("results") or {}).get("stats") or d.get("stats") or {}
              s, fa = st.get("successes", 0), st.get("failures", 0); tot = s + fa
              out += ["## Promptfoo — CyberSecEval (model)", "",
                      "| resisted | injected | total | resist rate |", "|---|---|---|---|",
                      f"| {s} | {fa} | {tot} | {(s/tot*100 if tot else 0):.1f}% |", ""]
          for f in glob.glob("security/garak/reports/garak-app*.report.jsonl"):
              total = passed = 0
              for ln in open(f):
                  try: e = json.loads(ln)
                  except Exception: continue
                  if e.get("entry_type") == "eval":
                      total += e.get("total", 0); passed += e.get("passed", 0)
              if total:
                  out += ["## Garak — app (RAG /recommend)", "",
                          "| resisted | total | resist rate |", "|---|---|---|",
                          f"| {passed} | {total} | {passed/total*100:.1f}% |", ""]
          for f in glob.glob("security/llmmap/reports/llmmap-*.txt"):
              tail = [l.rstrip() for l in open(f) if l.strip()][-6:]
              out += ["## LLMmap — router fingerprint (model)", "", "```", *tail, "```", ""]
          for f in sorted(glob.glob("security/ps-fuzz/reports/psfuzz-*.txt")):
              tail = [l.rstrip() for l in open(f) if l.strip()][-15:]
              out += ["## ps-fuzz — system prompt", "", "```", *tail, "```", ""]
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary and out: open(summary, "a").write("\n".join(out) + "\n")
          print("\n".join(out) or "no reports parsed")
          PY

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llmsecops-reports
          path: |
            security/promptfoo/cyberseceval/reports/
            security/garak/reports/
            security/llmmap/reports/
            security/ps-fuzz/reports/
          if-no-files-found: ignore

      - name: Tear down scan target
        if: always()
        run: |
          kubectl delete pod "${SCAN_POD}" -n "$NS" --ignore-not-found
          rm -f .env
