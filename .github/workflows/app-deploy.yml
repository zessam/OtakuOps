name: App Deploy (vLLM)

# Secure CI/CD for the Anime Recommender Streamlit app (self-hosted vLLM image).
# The Groq-backed variant (dockerfile.local + k8s/app-groq/) has NO pipeline yet and
# is deployed by hand; this workflow builds and deploys the vLLM image only.
#   push / PR (app sources, dockerfile, k8s/app/**): source gates -> build -> manifest policy.
#   push to main / manual dispatch: same gates, then build+push+sign+deploy to GKE.
# The deploy job WAITS FOR APPROVAL on the `production` environment and never runs from a PR.
# LLMSecOps (red-teaming the model/RAG endpoint) is a SEPARATE workflow — not here.
on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "src/**"
      - "pipeline/**"
      - "config/**"
      - "utils/**"
      - "data/**"
      - "requirements.txt"
      - "setup.py"
      - "dockerfile"
      - "k8s/app/**"
      - ".github/workflows/app-deploy.yml"
  pull_request:
    paths:
      - "app/**"
      - "src/**"
      - "pipeline/**"
      - "config/**"
      - "utils/**"
      - "data/**"
      - "requirements.txt"
      - "setup.py"
      - "dockerfile"
      - "k8s/app/**"
      - ".github/workflows/app-deploy.yml"

concurrency:
  group: app-${{ github.ref }}
  cancel-in-progress: false # never cancel an in-flight deploy

# Minimal by default; each job widens only what it needs (least privilege).
permissions:
  contents: read

env:
  CLUSTER_NAME: anime-rec-cluster
  CLUSTER_LOCATION: us-central1-c
  REGION: us-central1
  NAMESPACE: default
  AR_REPO: anime-rec # Artifact Registry repo (terraform: var.artifact_repo_name)
  IMAGE_NAME: anime-rec-app
  KUBECONFORM_VERSION: "0.6.7"

jobs:
  # ===========================================================================
  # STAGE 1 — parallel source gates (no cluster/registry access; run on push+PR)
  # ===========================================================================

  lint-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install ruff + pytest
        run: pip install ruff pytest
      - name: Ruff lint (advisory)
        run: ruff check . || true # advisory until the codebase is lint-clean
      - name: Pytest
        run: |
          # Exit code 5 == "no tests collected"; treat as pass until tests exist.
          # (disable -e so the non-zero exit doesn't abort before we inspect it)
          set +e
          pytest -q
          code=$?
          set -e
          if [ "$code" = "5" ]; then echo "No tests collected (yet)."; exit 0; fi
          exit $code

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: pip-audit (advisory)
        # Advisory (soft-fail), mirroring the checkov posture in infra-build.yml.
        # Flip to a hard gate once the pinned deps in requirements.txt are updated.
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc || true

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.18.4"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history for secret scanning
      - name: gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks detect --source . --redact --exit-code 1 # HARD gate

  bandit:
    name: bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: bandit
        run: |
          pip install bandit
          # Advisory report over app source; does not block the build.
          bandit -r app src pipeline config utils -ll || true

  hadolint:
    name: hadolint (Dockerfile lint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@v5
      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dockerfile
          format: sarif
          output-file: hadolint.sarif
          no-fail: true # advisory; surfaced in the Security tab
      - name: Upload hadolint SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint.sarif
          category: hadolint

  # ===========================================================================
  # STAGE 2 — build image locally + SBOM. No push. PR merge gate.
  # ===========================================================================
  build-scan:
    name: Build + SBOM (PR gate)
    runs-on: ubuntu-latest
    # PR-only: prove the image still builds before merge.
    # On push/dispatch the `deploy` job builds the PUSHED image, so the
    # image is only ever built once per run (no double build).
    if: github.event_name == 'pull_request'
    needs: [lint-test, pip-audit, gitleaks, bandit, hadolint, kubeconform, kube-linter]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load locally, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:ci
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 7

  # ===========================================================================
  # STAGE 3 — Kubernetes manifest gates (one scan per stage). push+PR.
  # ===========================================================================
  kubeconform:
    name: Manifest schema (kubeconform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Schema-validate manifests (kubeconform)
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /tmp kubeconform
          /tmp/kubeconform -strict -summary -ignore-missing-schemas k8s/app/ # HARD gate

  kube-linter:
    name: Manifest security (kube-linter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Security-lint manifests (kube-linter)
        uses: stackrox/kube-linter-action@v1.0.7
        with:
          directory: k8s/app # checks runAsNonRoot, limits, dropped caps, etc.

  # ===========================================================================
  # STAGE 4 — build+push+sign+deploy to GKE. Non-PR only; WAITS FOR APPROVAL.
  # ===========================================================================
  deploy:
    name: Build+push, sign, deploy to GKE
    runs-on: ubuntu-latest
    # Builds+pushes the image ONCE, then signs and deploys that exact digest.
    needs: [lint-test, pip-audit, gitleaks, bandit, hadolint, kubeconform, kube-linter]
    if: github.event_name != 'pull_request'
    environment: production # REQUIRED REVIEWERS => waits for approval
    permissions:
      contents: read
      id-token: write # Workload Identity Federation + cosign keyless
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 7

      - name: Sign image (cosign keyless / OIDC)
        uses: sigstore/cosign-installer@v3
      - name: cosign sign
        run: |
          cosign sign --yes \
            "${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${AR_REPO}/${IMAGE_NAME}@${{ steps.push.outputs.digest }}"

      - name: Deploy to GKE (by digest)
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${AR_REPO}/${IMAGE_NAME}@${{ steps.push.outputs.digest }}"
          PLACEHOLDER="image: ${REGION}-docker.pkg.dev/PROJECT_ID/${AR_REPO}/${IMAGE_NAME}:PLACEHOLDER"
          echo "Deploying $IMAGE"
          # Fail loudly if the manifest ever drifts from this literal: an unmatched sed
          # is silent, and we'd apply :PLACEHOLDER and only learn 5m later via
          # ImagePullBackOff. Both the initContainer and the app container match.
          if ! grep -qF "$PLACEHOLDER" k8s/app/deployment.yaml; then
            echo "::error::placeholder not found in k8s/app/deployment.yaml: ${PLACEHOLDER}"
            exit 1
          fi
          # Pin the manifest placeholder to the exact digest we just built + scanned.
          sed -i "s|${PLACEHOLDER}|image: ${IMAGE}|" k8s/app/deployment.yaml
          if grep -q "PLACEHOLDER" k8s/app/deployment.yaml; then
            echo "::error::an unreplaced PLACEHOLDER remains in k8s/app/deployment.yaml"
            grep -n "PLACEHOLDER" k8s/app/deployment.yaml
            exit 1
          fi
          kubectl apply -f k8s/app/ -n "$NAMESPACE"
          kubectl rollout status deployment/anime-rec-app -n "$NAMESPACE" --timeout=5m


