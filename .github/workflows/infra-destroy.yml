name: Infra Destroy

# Destroys the ENTIRE infrastructure created by Infra Apply.
# Run manually and type "destroy" to confirm.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm teardown of ALL infra'
        required: true
        default: ""

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation (keyless auth)

env:
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: production # auth secrets are scoped to this environment
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Verify confirmation
        if: ${{ github.event.inputs.confirm != 'destroy' }}
        run: |
          echo "::error::You must type 'destroy' to confirm. Got: '${{ github.event.inputs.confirm }}'"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
