name: Infra Build

# Security-gated pipeline for the GKE + GCS + Artifact Registry infra.
# Stage 1 (parallel source gates): validate, tfsec, checkov, gitleaks.
# Stage 2: plan — depends on ALL stage-1 gates.
# Stage 3: policy — OPA/conftest against the PLAN JSON (stable, resolved schema).
# Stage 4: apply — queued after policy, WAITS FOR APPROVAL on `production`.
on:
  workflow_dispatch:
  push:
    paths:
      - "terraform/**"
      - ".github/workflows/infra-build.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/infra-build.yml"

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: true

# id-token: write is required for Workload Identity Federation (keyless auth).
permissions:
  contents: read
  id-token: write
  security-events: write # upload SARIF to the Security tab
  pull-requests: read

env:
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TERRAFORM_VERSION: 1.9.8
  CONFTEST_VERSION: 0.56.0
  GITLEAKS_VERSION: 8.18.4

jobs:
  # ===========================================================================
  # STAGE 1 — parallel source gates (all run before plan; plan depends on them)
  # ===========================================================================

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Terraform
        run: |
          curl -fsSL "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip" -o /tmp/terraform.zip
          unzip -o /tmp/terraform.zip -d /tmp
          sudo install /tmp/terraform /usr/local/bin/terraform
      - name: fmt + validate
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false -input=false
          terraform validate

  tfsec:
    name: tfsec (IaC scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: tfsec
        uses: aquasecurity/tfsec-sarif-action@v0.1.4
        with:
          working_directory: terraform
          sarif_file: tfsec.sarif
      - name: Upload tfsec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: tfsec.sarif
          category: tfsec

  checkov:
    name: Checkov (IaC scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: true # findings surfaced, not hard-blocking
      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov.sarif
          category: checkov

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history for secret scanning
      - name: gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks detect --source . --redact --exit-code 1

  # ===========================================================================
  # STAGE 2 — plan (depends on ALL stage-1 gates)
  # ===========================================================================
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [validate, tfsec, checkov, gitleaks]
    # Auth secrets + TF_STATE_BUCKET live in the `production` environment.
    environment: production
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Install Terraform
        run: |
          curl -fsSL "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip" -o /tmp/terraform.zip
          unzip -o /tmp/terraform.zip -d /tmp
          sudo install /tmp/terraform /usr/local/bin/terraform

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform Plan
        run: |
          terraform plan -input=false -out=tfplan
          terraform show -json tfplan > plan.json

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            terraform/tfplan
            terraform/plan.json
          retention-days: 1

  # ===========================================================================
  # STAGE 3 — OPA policy against the PLAN JSON (stable, fully-resolved schema)
  # ===========================================================================
  policy:
    name: OPA Policy (conftest)
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - uses: actions/checkout@v5

      - name: Download plan artifacts
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: plan

      - name: Setup conftest
        run: |
          curl -sSL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin conftest

      - name: Conftest policy check (plan JSON)
        run: conftest test plan/plan.json -p terraform/policy

  # ===========================================================================
  # STAGE 4 — apply (queued after policy; WAITS FOR APPROVAL on `production`)
  #           Skipped only for pull_request events (never apply from a PR).
  # ===========================================================================
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: policy
    if: github.event_name != 'pull_request'
    environment: production # REQUIRED REVIEWERS here => apply waits for approval
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Install Terraform
        run: |
          curl -fsSL "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip" -o /tmp/terraform.zip
          unzip -o /tmp/terraform.zip -d /tmp
          sudo install /tmp/terraform /usr/local/bin/terraform

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Download plan artifacts
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan
