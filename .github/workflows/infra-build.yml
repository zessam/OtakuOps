name: Infra Build

# Security-gated pipeline that provisions the GKE + GCS + Artifact Registry infra.
# Runs automatically on any change under terraform/ (scan -> plan -> OPA policy).
# Apply happens ONLY on manual dispatch and requires approval on the
# `production` environment (add required reviewers in repo settings).
on:
  workflow_dispatch:
  # Fire on ANY change under terraform/ (scan + plan + policy only — never apply).
  push:
    paths:
      - "terraform/**"
      - ".github/workflows/infra-build.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/infra-build.yml"

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: true

# id-token: write is required for Workload Identity Federation (keyless auth).
permissions:
  contents: read
  id-token: write
  security-events: write # upload SARIF to the Security tab
  pull-requests: read

env:
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TERRAFORM_VERSION: 1.9.8
  CONFTEST_VERSION: 0.56.0

jobs:
  # ---------------------------------------------------------------------------
  # 1. Security scanning — static analysis of the IaC + secret detection
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # gitleaks needs full history

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: terraform
        run: |
          terraform init -backend=false -input=false
          terraform validate

      # --- IaC scanning: tfsec (findings surfaced to the Security tab) ---
      - name: tfsec
        uses: aquasecurity/tfsec-sarif-action@v0.1.4
        with:
          working_directory: terraform
          sarif_file: tfsec.sarif

      - name: Upload tfsec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: tfsec.sarif
          category: tfsec

      # --- IaC scanning: Checkov ---
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: true # findings are surfaced, not hard-blocking

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov.sarif
          category: checkov

      # --- Secret scanning: gitleaks (HARD blocks the pipeline on a hit) ---
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # 2. Plan — authenticated plan against real state (runs automatically, no gate)
  # ---------------------------------------------------------------------------
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: security-scan
    # No environment here on purpose: plan must run automatically on push.
    # Auth secrets must therefore be REPOSITORY secrets (not environment secrets).
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform Plan
        run: |
          terraform plan -input=false -out=tfplan
          terraform show -json tfplan > plan.json

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            terraform/tfplan
            terraform/plan.json
          retention-days: 1

  # ---------------------------------------------------------------------------
  # 3. OPA policy — conftest against the plan JSON (separate, hard-blocking job)
  # ---------------------------------------------------------------------------
  policy:
    name: OPA Policy (conftest)
    runs-on: ubuntu-latest
    needs: plan
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download plan artifacts
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: plan

      - name: Setup conftest
        run: |
          curl -sSL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin conftest

      - name: Conftest policy check
        run: conftest test plan/plan.json -p terraform/policy

  # ---------------------------------------------------------------------------
  # 4. Apply — manual dispatch only, REQUIRES approval on `production`
  # ---------------------------------------------------------------------------
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: policy
    if: github.event_name == 'workflow_dispatch'
    environment: production # add REQUIRED REVIEWERS here => manual approval gate
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Download plan artifacts
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan
