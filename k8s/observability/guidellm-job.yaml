# GuideLLM — performance benchmark. It drives controlled LOAD at the router; the
# results show up as live serving metrics (throughput / TTFT / latency) that
# Prometheus already scrapes — so watch the Grafana serving dashboard while this runs.
# Runs as a client on the app pool (no serve-pool toleration).
apiVersion: batch/v1
kind: Job
metadata:
  name: guidellm-benchmark
  namespace: default
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: guidellm
          image: python:3.11-slim
          command: ["bash", "-lc"]
          args:
            - |
              set -e
              pip install --quiet guidellm
              # Current GuideLLM CLI: `guidellm run` with kind=... options.
              # constant rate=1 + small tokens keeps it light on the CPU model.
              guidellm run \
                --backend "kind=openai_http,target=http://vllm-router-service.default.svc.cluster.local:80" \
                --profile "kind=constant,rate=1" \
                --constraint "kind=max_duration,seconds=60" \
                --data "kind=synthetic_text,prompt_tokens=64,output_tokens=64" \
                --output-path /tmp/guidellm.json
              echo "=== GuideLLM finished. Its report is above; the load it generated"
              echo "=== is visible on the Grafana vLLM serving dashboard (throughput/TTFT/latency)."
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits: { memory: "1Gi" }
